<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Counter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Word Counter</h1>
      <p>Analyze your writing instantly with live stats.</p>
    </header>

    <main class="tool">
      <section class="editor-card">
        <label for="textInput" class="label">Paste or type your text</label>
        <textarea
          id="textInput"
          placeholder="Start typing here..."
        ></textarea>

        <div class="actions">
          <button id="clearBtn">Clear</button>
          <button id="sampleBtn">Use Sample Text</button>
        </div>
      </section>

      <section class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Words</span>
          <span class="stat-value" id="wordCount">0</span>
        </div>

        <div class="stat-card">
          <span class="stat-label">Characters</span>
          <span class="stat-value" id="charCount">0</span>
        </div>

        <div class="stat-card">
          <span class="stat-label">Characters (no spaces)</span>
          <span class="stat-value" id="charNoSpaces">0</span>
        </div>

        <div class="stat-card">
          <span class="stat-label">Sentences</span>
          <span class="stat-value" id="sentenceCount">0</span>
        </div>

        <div class="stat-card">
          <span class="stat-label">Paragraphs</span>
          <span class="stat-value" id="paragraphCount">0</span>
        </div>

        <div class="stat-card">
          <span class="stat-label">Reading Time</span>
          <span class="stat-value" id="readingTime">0 sec</span>
        </div>

        <div class="stat-card">
          <span class="stat-label">Speaking Time</span>
          <span class="stat-value" id="speakingTime">0 sec</span>
        </div>

        <div class="stat-card">
          <span class="stat-label">Average Word Length</span>
          <span class="stat-value" id="avgWordLength">0</span>
        </div>

        <div class="stat-card full-width">
          <span class="stat-label">Longest Word</span>
          <span class="stat-value small" id="longestWord">—</span>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
